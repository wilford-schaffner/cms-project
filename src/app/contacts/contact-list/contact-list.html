<div class="panel panel-default">
  <div class="panel-heading clearfix">
    <div class="row pad-left-right">
      <span class="title pull-left">Contacts</span>
      <a class="btn btn-success pull-right" href="#">New Contact</a>
    </div>
  </div>
  <div class="panel-body">
    <app-contact-item
      *ngFor="let contact of contacts"
      [contact]="contact"
      (click)="onSelected(contact)"
    ></app-contact-item>
  </div>
</div>
