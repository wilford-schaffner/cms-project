<div class="panel panel-default">
  <div class="panel-heading detail-header">
    <div class="pull-left" *ngIf="contact">
      <h3 class="detail-name">{{ contact.name }}</h3>
      <img class="img-responsive detail-image" [src]="contact.imageUrl" [alt]="contact.name" />
    </div>
    <div class="pull-right btn-group">
      <a class="btn btn-primary" [routerLink]="['/contacts', contact?.id, 'edit']">Edit</a>
      <a class="btn btn-danger" (click)="onDelete()">Delete</a>
    </div>
    <div class="clearfix"></div>
  </div>
  <div class="panel-body">
    <p><strong>Email:</strong> {{ contact?.email || '' }}</p>
    <p><strong>Phone:</strong> {{ contact?.phone || '' }}</p>
  </div>
</div>
